<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WSU EIT Forms — Documentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  :root {
    --brand: #a60f2d;
    --brand-deep: #680222;
    --brand-text: #7a0b21;
    --ink: #262626;
    --quiet: #595959;
    --edge: #767676;
    --hair: #e4e4e4;
    --paper: #ffffff;
    --wash: #f4f2f2;
    --mist: #f7f7f7;
    --code-bg: #f6f6f4;
    --face: "Montserrat", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--face);
    color: var(--ink);
    background: var(--wash);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── top bar ───────────────────────────────────────────── */
  .topbar {
    background: #1f1f1f;
    border-bottom: 4px solid var(--brand);
    color: #fff;
    display: flex;
    align-items: center;
    gap: .7rem;
    padding: .7rem 1.4rem;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .topbar__crest { width: 30px; height: 30px; flex: none; fill: #fff; }
  .topbar__name { font-weight: 800; letter-spacing: .01em; font-size: 1rem; }
  .topbar__sub { color: #c9c4c4; font-weight: 600; font-size: .82rem; margin-left: .2rem; }

  /* ── layout ────────────────────────────────────────────── */
  .layout { display: grid; grid-template-columns: 16rem 1fr; align-items: start; }
  @media (max-width: 46rem) { .layout { grid-template-columns: 1fr; } }

  .sidebar {
    position: sticky;
    top: 3.4rem;
    align-self: start;
    height: calc(100vh - 3.4rem);
    overflow-y: auto;
    background: var(--paper);
    border-right: 1px solid var(--hair);
    padding: 1.4rem 1rem 3rem;
  }
  @media (max-width: 46rem) {
    .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--hair); }
  }

  .switch { display: flex; flex-direction: column; gap: .3rem; margin-bottom: 1.4rem; }
  .switch button {
    font: inherit;
    font-weight: 700;
    font-size: .9rem;
    text-align: left;
    color: var(--ink);
    background: none;
    border: 1px solid transparent;
    border-radius: 7px;
    padding: .5rem .7rem;
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: .5rem;
  }
  .switch button:hover { background: var(--mist); }
  .switch button[aria-current="true"] { background: var(--brand); color: #fff; }
  .switch button small { font-weight: 600; font-size: .72rem; opacity: .7; }
  .switch button[aria-current="true"] small { color: #f3c9d1; opacity: 1; }

  .toc-label {
    font-size: .68rem; font-weight: 800; letter-spacing: .13em; text-transform: uppercase;
    color: var(--quiet); margin: 0 0 .55rem .2rem;
  }
  .toc { display: flex; flex-direction: column; gap: .1rem; border-left: 2px solid var(--hair); }
  .toc a {
    text-decoration: none;
    color: var(--quiet);
    font-size: .85rem;
    font-weight: 600;
    padding: .26rem .7rem;
    margin-left: -2px;
    border-left: 2px solid transparent;
    line-height: 1.3;
  }
  .toc a:hover { color: var(--brand-text); }
  .toc a.lvl3 { padding-left: 1.4rem; font-weight: 500; font-size: .8rem; }
  .toc a.active { color: var(--brand-text); border-left-color: var(--brand); background: var(--mist); }

  /* ── article ───────────────────────────────────────────── */
  .doc-wrap { padding: 2.4rem clamp(1.2rem, 4vw, 3.5rem) 6rem; min-width: 0; }
  .doc { max-width: 52rem; margin: 0 auto; background: var(--paper); border: 1px solid var(--hair); border-radius: 12px; padding: clamp(1.4rem, 3vw, 3rem); box-shadow: 0 1px 3px rgba(0,0,0,.04); }

  .doc h1 { font-size: 2rem; font-weight: 800; line-height: 1.12; margin: 0 0 .2rem; letter-spacing: -.01em; }
  .doc h1 + p { color: var(--quiet); font-size: 1.05rem; }
  .doc h2 {
    font-size: 1.4rem; font-weight: 800; line-height: 1.2;
    margin: 2.6rem 0 .9rem; padding-top: 1.4rem; border-top: 1px solid var(--hair);
    scroll-margin-top: 4rem;
  }
  .doc h2:first-of-type { border-top: 0; padding-top: 0; }
  .doc h3 { font-size: 1.08rem; font-weight: 700; margin: 1.8rem 0 .6rem; scroll-margin-top: 4rem; }
  .doc h4 { font-size: .95rem; font-weight: 700; margin: 1.4rem 0 .5rem; color: var(--brand-text); }
  .doc p, .doc li { text-wrap: pretty; }
  .doc a { color: var(--brand-text); text-underline-offset: 2px; }
  .doc strong { font-weight: 700; }
  .doc hr { border: 0; border-top: 1px solid var(--hair); margin: 2rem 0; }

  .doc ul, .doc ol { padding-left: 1.3rem; }
  .doc li { margin: .3rem 0; }
  .doc li::marker { color: var(--brand); }

  .doc blockquote {
    margin: 1.2rem 0; padding: .7rem 1.1rem;
    background: var(--mist); border-left: 4px solid var(--brand);
    border-radius: 0 8px 8px 0; color: #3a3a3a;
  }
  .doc blockquote p { margin: .3rem 0; }

  /* inline + block code */
  .doc :not(pre) > code {
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    font-size: .86em;
    background: var(--code-bg);
    border: 1px solid var(--hair);
    border-radius: 5px;
    padding: .08em .38em;
    color: var(--brand-deep);
    word-break: break-word;
  }
  .doc pre {
    background: #1e1e22;
    color: #e7e7ea;
    border-radius: 10px;
    padding: 1rem 1.1rem;
    overflow-x: auto;
    margin: 1.1rem 0;
    border: 1px solid #2c2c33;
    box-shadow: inset 3px 0 0 var(--brand);
  }
  .doc pre code {
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    font-size: .83rem;
    line-height: 1.6;
    color: inherit;
    background: none;
    border: 0;
    padding: 0;
    white-space: pre;
  }

  /* tables */
  .doc table { width: 100%; border-collapse: collapse; margin: 1.2rem 0; font-size: .9rem; display: block; overflow-x: auto; }
  .doc thead th { background: var(--brand); color: #fff; text-align: left; font-weight: 700; }
  .doc th, .doc td { border: 1px solid var(--hair); padding: .5rem .7rem; vertical-align: top; }
  .doc tbody tr:nth-child(even) { background: var(--mist); }
  .doc td code { white-space: nowrap; }

  .loading { color: var(--quiet); font-style: italic; padding: 2rem 0; }
  .err { color: var(--brand-deep); background: #fbebee; border: 1px solid #f0c9d1; border-radius: 8px; padding: 1rem 1.2rem; }
  .err code { background: #fff; padding: .1em .4em; border-radius: 4px; }
</style>
</head>
<body>

    <span class="topbar__name">WSU EIT Forms</span>
    <span class="topbar__sub">Documentation</span>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="switch" id="switch" aria-label="Documents"></nav>
      <p class="toc-label">On this page</p>
      <nav class="toc" id="toc" aria-label="Table of contents"></nav>
    </aside>
    <div class="doc-wrap">
      <article class="doc" id="doc"><p class="loading">Loading…</p></article>
    </div>
  </div>

<script>
(function () {
  var DOCS = [
    { id: 'cookbook', file: 'SLATE-COOKBOOK.md', label: 'Slate Cookbook', note: 'examples' },
    { id: 'readme',   file: 'README.md',         label: 'README',         note: 'overview' },
    { id: 'research', file: 'RESEARCH.md',        label: 'Pattern decisions', note: 'research' }
  ];
  var docEl = document.getElementById('doc');
  var tocEl = document.getElementById('toc');
  var switchEl = document.getElementById('switch');
  var cache = {};

  // doc switcher
  DOCS.forEach(function (d) {
    var b = document.createElement('button');
    b.type = 'button';
    b.dataset.id = d.id;
    b.innerHTML = d.label + ' <small>' + d.note + '</small>';
    b.addEventListener('click', function () { load(d.id); history.replaceState(null, '', '#' + d.id); });
    switchEl.appendChild(b);
  });

  function slug(s) {
    return s.toLowerCase().replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-').slice(0, 60);
  }

  function buildToc() {
    tocEl.innerHTML = '';
    var used = {};
    var heads = docEl.querySelectorAll('h2, h3');
    heads.forEach(function (h) {
      var base = slug(h.textContent) || 'sec';
      var id = base; var n = 2;
      while (used[id]) { id = base + '-' + n++; }
      used[id] = 1;
      h.id = id;
      var a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      if (h.tagName === 'H3') a.className = 'lvl3';
      a.addEventListener('click', function () {
        setTimeout(function () { tocEl.querySelectorAll('a').forEach(function (x) { x.classList.remove('active'); }); a.classList.add('active'); }, 0);
      });
      tocEl.appendChild(a);
    });
    initScrollSpy(heads);
  }

  var spy;
  function initScrollSpy(heads) {
    if (spy) spy.disconnect();
    spy = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          var id = e.target.id;
          tocEl.querySelectorAll('a').forEach(function (x) {
            x.classList.toggle('active', x.getAttribute('href') === '#' + id);
          });
        }
      });
    }, { rootMargin: '-10% 0px -75% 0px', threshold: 0 });
    heads.forEach(function (h) { spy.observe(h); });
  }

  function render(md) {
    if (window.marked) {
      marked.setOptions({ gfm: true, breaks: false });
      docEl.innerHTML = marked.parse(md);
    } else {
      docEl.innerHTML = '<pre style="white-space:pre-wrap">' +
        md.replace(/&/g, '&amp;').replace(/</g, '&lt;') + '</pre>';
    }
    buildToc();
    docEl.parentElement.scrollTop = 0;
    window.scrollTo(0, 0);
  }

  function load(id) {
    var d = DOCS.filter(function (x) { return x.id === id; })[0] || DOCS[0];
    switchEl.querySelectorAll('button').forEach(function (b) {
      b.setAttribute('aria-current', b.dataset.id === d.id ? 'true' : 'false');
    });
    if (cache[d.id]) { render(cache[d.id]); return; }
    docEl.innerHTML = '<p class="loading">Loading ' + d.label + '…</p>';
    fetch(d.file)
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(function (t) { cache[d.id] = t; render(t); })
      .catch(function (err) {
        docEl.innerHTML = '<div class="err"><strong>Couldn\u2019t load <code>' + d.file +
          '</code>.</strong><br>This viewer reads the Markdown file next to it; open it from a served folder (not file://). ' +
          'Details: ' + err.message + '</div>';
        tocEl.innerHTML = '';
      });
  }

  var start = (location.hash || '').replace('#', '');
  load(DOCS.some(function (d) { return d.id === start; }) ? start : 'cookbook');
})();
</script>

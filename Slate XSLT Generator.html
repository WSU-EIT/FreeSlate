<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Slate XSLT Generator — WSU EIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  /* ══ TOOL CHROME — WSU-branded admin shell ══════════════════════════════ */
  :root{
    --crimson:#2271b1; --crimson-deep:#135e96; --flag:#d63638;
    --ink:#1e1e1e; --quiet:#595959; --mute:#6e6466; --mute-stage:#5b5254; --line:#dcdcde; --line2:#f0f0f1;
    --panel:#fff; --card:#fff; --stage:#f0f0f1;
    --ok:#1c7a3f; --okbg:#e7f4ea; --warn:#8a5a08; --warnbg:#fbf0d8;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
    --sans:"Montserrat","Helvetica Neue",Helvetica,Arial,sans-serif;
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--ui);color:var(--ink);background:var(--stage);overflow:hidden;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--crimson);outline-offset:2px;}
  ::-webkit-scrollbar{width:11px;height:11px;}
  ::-webkit-scrollbar-thumb{background:#cfc7c8;border-radius:6px;border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:#b7abad;background-clip:padding-box;}
  summary{list-style:none;cursor:pointer;}
  summary::-webkit-details-marker{display:none;}
  code{font-family:var(--mono);}

  /* app bar */
  .appbar{height:60px;display:flex;align-items:center;background:#fff;border-bottom:1px solid var(--line);color:#1e1e1e;position:relative;z-index:30;overflow:hidden;}
  .appbar__brand{display:flex;align-items:center;gap:0;flex:0 0 auto;}
  .appbar__crest{width:40px;height:40px;margin:0 4px 0 12px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#1e1e1e;padding:7px;}
  .appbar__crest svg{width:100%;height:100%;fill:#fff;}
  .appbar__title{padding:0 18px 0 8px;display:flex;flex-direction:column;justify-content:center;}
  .appbar__title h1{font-size:14px;font-weight:700;letter-spacing:.01em;margin:0;line-height:1.2;}
  .appbar__title span{font-size:11px;color:#757575;font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
  .appbar__spacer{flex:1 1 12px;min-width:12px;}
  .appbar__tools{display:flex;align-items:center;gap:12px;padding:0 16px;flex:0 0 auto;}
  .appbar__doc{display:flex;align-items:center;gap:8px;background:#f0f0f1;border:1px solid var(--line);border-radius:6px;padding:6px 14px;font-size:12.5px;color:#1e1e1e;font-weight:600;flex:0 1 auto;min-width:0;}
  .appbar__doc-ic{color:#757575;font-size:13px;flex:0 0 auto;}
  .appbar__doc #appDocPath{font-family:var(--mono);font-weight:500;color:#3c434a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @media (max-width:1180px){.appbar__doc{display:none;}}

  .seg{display:flex;background:#f0f0f1;border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px;}
  .seg button{background:transparent;border:none;color:#50575e;font-size:12px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;}
  .seg button.on{background:#fff;color:var(--crimson);box-shadow:0 1px 2px rgba(0,0,0,.12);}

  .preflight{border:none;border-radius:999px;font-size:12px;font-weight:700;padding:7px 13px;cursor:pointer;letter-spacing:.01em;}
  .preflight.ok{background:var(--okbg);color:var(--ok);}
  .preflight.warn{background:var(--warnbg);color:var(--warn);}

  .field-inline{display:flex;align-items:center;gap:7px;font-size:11px;color:#757575;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
  .field-inline select{font-family:inherit;padding:7px 9px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;background:#fff;color:#1e1e1e;cursor:pointer;text-transform:none;letter-spacing:0;}

  .btn-primary{display:inline-flex;align-items:center;gap:7px;padding:9px 17px;background:var(--crimson);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
  .btn-primary:hover{background:var(--crimson-deep);}

  /* body split */
  .work{height:calc(100% - 60px);display:flex;min-height:0;}
  aside{width:356px;flex:0 0 auto;order:2;border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;overflow-x:hidden;}
  .aside-pad{padding:0 0 80px;}
  .aside-head{position:sticky;top:0;z-index:2;background:#fff;border-bottom:1px solid var(--line);padding:13px 16px;font-size:13px;font-weight:600;color:#1e1e1e;display:flex;align-items:center;justify-content:space-between;}
  .aside-head span:last-child{font-size:11px;color:#757575;font-weight:500;}

  details.grp{border:none;border-bottom:1px solid var(--line);border-radius:0;margin:0;background:transparent;overflow:hidden;}
  details.grp>summary{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px;font-size:13px;font-weight:600;user-select:none;}
  details.grp>summary .chev{color:#b0a7a9;font-size:11px;transition:transform .18s;}
  details.grp[open]>summary .chev{transform:rotate(180deg);}
  .grp-body{padding:2px 16px 18px;border-top:none;}
  .grp-note{font-size:11px;color:var(--quiet);line-height:1.5;margin:0 0 11px;}
  .grp-note code{background:#f0f0f1;padding:1px 5px;border-radius:4px;font-size:10.5px;}
  .grp-sub{font-size:10.5px;font-weight:700;color:var(--quiet);text-transform:uppercase;letter-spacing:.06em;margin:2px 0 4px;}

  .fl{font-size:11px;font-weight:700;color:var(--quiet);text-transform:uppercase;letter-spacing:.05em;margin:0 0 5px;}
  .fl.mt{margin-top:14px;}
  .fl-row{display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px;}
  .fl-row .fl{margin:0;}

  input[type=text],input[type=url],textarea,.aside select{width:100%;font-family:inherit;font-size:13px;color:var(--ink);padding:8px 10px;border:1px solid #c3c4c7;border-radius:4px;background:#fff;}
  textarea{resize:vertical;min-height:64px;line-height:1.5;}
  input.mono{font-family:var(--mono);font-size:12px;}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--crimson);outline-offset:1px;border-color:var(--crimson);}

  /* preflight list */
  .pf-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;font-size:10.5px;font-weight:700;}
  .pf-count.ok{background:var(--okbg);color:var(--ok);}
  .pf-count.warn{background:var(--warnbg);color:var(--warn);}
  .pf-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;}
  .pf-item{font-size:11.5px;line-height:1.45;padding:7px 9px 7px 26px;border-radius:7px;position:relative;}
  .pf-item::before{position:absolute;left:9px;top:7px;font-size:11px;}
  .pf-item.warn{background:var(--warnbg);color:#6b4708;}
  .pf-item.warn::before{content:"⚠";}
  .pf-item.ok{background:var(--okbg);color:#155e31;}
  .pf-item.ok::before{content:"✓";}

  .swatch-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
  .swatch-row input[type=color]{width:34px;height:32px;border:1px solid #c3c4c7;border-radius:4px;padding:2px;background:#fff;cursor:pointer;flex:0 0 auto;}
  .swatch-row .sw-meta{flex:1;min-width:0;}
  .swatch-row .sw-meta b{display:block;font-size:12.5px;font-weight:600;}
  .swatch-row .sw-meta span{font-size:10.5px;color:var(--mute);font-family:var(--mono);}
  .swatch-row input.hex{width:88px;font-family:var(--mono);font-size:12px;text-align:center;padding:7px 6px;}

  .item{border:1px solid var(--line2);border-radius:9px;padding:9px 10px;margin-bottom:9px;background:#fbfafa;}
  .item .row{display:flex;gap:7px;align-items:flex-start;}
  .item .row .grow{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
  .stack{display:flex;flex-direction:column;gap:2px;flex:0 0 auto;}
  .ibtn{width:24px;height:20px;border:1px solid #c3c4c7;background:#fff;border-radius:4px;font-size:10px;color:#6f6567;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
  .ibtn:hover{border-color:var(--crimson);color:var(--crimson);}
  .ibtn.del:hover{border-color:var(--flag);color:var(--flag);}

  .add{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--crimson);background:#f0f6fc;border:1px solid #c5d9ed;border-radius:4px;padding:6px 11px;cursor:pointer;}
  .add:hover{background:#e0edf9;}
  .add.wide{width:100%;justify-content:center;padding:9px;}

  .kindtabs{display:flex;gap:3px;background:#f0f0f1;border-radius:7px;padding:3px;margin-bottom:9px;}
  .kindtabs button{flex:1;background:transparent;border:none;font-size:11.5px;font-weight:600;color:var(--mute);padding:6px;border-radius:5px;cursor:pointer;}
  .kindtabs button.on{background:#fff;color:var(--crimson);box-shadow:0 1px 2px rgba(0,0,0,.06);}

  .toggle{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--mute);text-transform:none;letter-spacing:0;cursor:pointer;}
  .toggle input{appearance:none;-webkit-appearance:none;flex:0 0 auto;width:36px;height:20px;margin:0;border-radius:999px;background:#8c8f94;position:relative;cursor:pointer;transition:background .15s;}
  .toggle input::before{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.25);}
  .toggle input:checked{background:var(--crimson);}
  .toggle input:checked::before{transform:translateX(16px);}

  .rangewrap{margin-bottom:14px;}
  .rangewrap .rl{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px;}
  .rangewrap .rl code{color:var(--crimson);font-size:11.5px;}
  .rangewrap input[type=range]{width:100%;accent-color:var(--crimson);cursor:pointer;}
  .rangewrap .rt{font-size:10.5px;color:var(--mute);font-family:var(--mono);margin-top:3px;}

  /* stage */
  main.stage{flex:1;min-width:0;order:1;overflow:auto;background:var(--stage);padding:24px 26px 70px;}
  .stage-inner{max-width:1060px;margin:0 auto;}
  .stage-tools{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:8px;}
  .stage-tools .blk{display:flex;flex-direction:column;gap:5px;}
  .stage-tools .cap{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mute-stage);}
  .stage-tools select,.stage-tools input{font-family:inherit;padding:8px 11px;border:1px solid #d5cdcf;border-radius:8px;font-size:13px;background:#fff;}
  .stage-tools .grow{flex:1;min-width:200px;}
  .preview-note{font-size:11px;color:var(--mute-stage);margin:0 0 16px;}

  /* debug / wireframe views */
  .debugbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 15px;}
  .debugbar .cap{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mute-stage);}
  .segdbg button{padding:6px 11px;font-size:11.5px;white-space:nowrap;}
  .dbg-hint{font-size:11.5px;color:var(--mute-stage);}
  /* WIREFRAME: strip color + imagery, show boxes only */
  #preview[data-dbg="wire"] *{background:transparent!important;background-image:none!important;color:#54494b!important;border-color:#c3c4c7!important;box-shadow:none!important;text-shadow:none!important;outline:1px solid rgba(30,30,30,.13);}
  #preview[data-dbg="wire"] img,#preview[data-dbg="wire"] svg{opacity:.18;}
  #preview[data-dbg="wire"] a{text-decoration:underline;}
  #preview[data-dbg="wire"] .z-h1::after,#preview[data-dbg="wire"] .w-topbar,#preview[data-dbg="wire"] .w-deck,#preview[data-dbg="wire"] .w-baseline{background:#fafafa!important;}
  /* OUTLINES: x-ray every element, depth-colored */
  #preview[data-dbg="outline"] *{outline:1px solid rgba(19,94,150,.38)!important;}
  #preview[data-dbg="outline"] * *{outline-color:rgba(214,54,56,.34)!important;}
  #preview[data-dbg="outline"] * * *{outline-color:rgba(31,138,91,.34)!important;}
  #preview[data-dbg="outline"] * * * *{outline-color:rgba(140,106,0,.36)!important;}
  #preview[data-dbg="outline"] * * * * *{outline-color:rgba(120,60,160,.34)!important;}
  /* COMPONENTS: label each region with tag + class */
  #preview[data-dbg="labels"] .w-topbar,
  #preview[data-dbg="labels"] .w-menu,
  #preview[data-dbg="labels"] .w-zone,
  #preview[data-dbg="labels"] .w-banner,
  #preview[data-dbg="labels"] .w-deck,
  #preview[data-dbg="labels"] .w-baseline,
  #preview[data-dbg="labels"] .z-card{position:relative;outline:1.5px dashed rgba(19,94,150,.55)!important;outline-offset:-2px;}
  #preview[data-dbg="labels"] .w-topbar::before,
  #preview[data-dbg="labels"] .w-menu::before,
  #preview[data-dbg="labels"] .w-zone::before,
  #preview[data-dbg="labels"] .w-banner::before,
  #preview[data-dbg="labels"] .w-deck::before,
  #preview[data-dbg="labels"] .w-baseline::before,
  #preview[data-dbg="labels"] .z-card::before{position:absolute;top:0;left:0;z-index:6;background:#135e96;color:#fff;font:600 10px/1.5 var(--mono);letter-spacing:.02em;padding:1px 7px;border-radius:0 0 4px 0;white-space:nowrap;pointer-events:none;}
  #preview[data-dbg="labels"] .w-topbar::before{content:"header.w-topbar";}
  #preview[data-dbg="labels"] .w-menu::before{content:"nav.w-menu";}
  #preview[data-dbg="labels"] .w-zone::before{content:"Slate content zone";background:#a60f2d;}
  #preview[data-dbg="labels"] .w-banner::before{content:"div.wsu-eit-banner";}
  #preview[data-dbg="labels"] .w-deck::before{content:"footer.w-deck";}
  #preview[data-dbg="labels"] .w-baseline::before{content:"footer.w-baseline";}
  #preview[data-dbg="labels"] .z-card::before{content:"Slate widget · injected";background:#1f8a5b;}
  /* GRID: responsive reference overlay — column count set per breakpoint via JS */
  #preview[data-dbg="grid"]{position:relative;--gcols:12;--ggut:24px;}
  #preview[data-dbg="grid"]::after{content:"";position:absolute;inset:0;z-index:5;pointer-events:none;background:repeating-linear-gradient(to right,rgba(214,54,56,.10) 0,rgba(214,54,56,.10) calc((100% - (var(--gcols) - 1)*var(--ggut))/var(--gcols)),transparent 0,transparent calc((100% - (var(--gcols) - 1)*var(--ggut))/var(--gcols) + var(--ggut)));}
  /* BRAND CLASSES: map each region to its real wsu-eit-* export class */
  #preview[data-dbg="brand"]{position:relative;outline:2px solid rgba(166,15,45,.5);outline-offset:-2px;}
  #preview[data-dbg="brand"] .w-topbar,
  #preview[data-dbg="brand"] .w-menu,
  #preview[data-dbg="brand"] .w-zone,
  #preview[data-dbg="brand"] .w-banner,
  #preview[data-dbg="brand"] .w-deck,
  #preview[data-dbg="brand"] .w-baseline,
  #preview[data-dbg="brand"] .w-credit{position:relative;outline:1.5px dashed rgba(166,15,45,.6)!important;outline-offset:-2px;}
  #preview[data-dbg="brand"]::before,
  #preview[data-dbg="brand"] .w-topbar::before,
  #preview[data-dbg="brand"] .w-menu::before,
  #preview[data-dbg="brand"] .w-zone::before,
  #preview[data-dbg="brand"] .w-banner::before,
  #preview[data-dbg="brand"] .w-deck::before,
  #preview[data-dbg="brand"] .w-baseline::before,
  #preview[data-dbg="brand"] .w-credit::before{position:absolute;top:0;left:0;z-index:7;background:#a60f2d;color:#fff;font:600 10px/1.5 var(--mono);letter-spacing:.02em;padding:1px 7px;border-radius:0 0 4px 0;white-space:nowrap;pointer-events:none;}
  #preview[data-dbg="brand"]::before{content:".wsu-eit · ownership hook";left:auto;right:0;border-radius:0 0 0 4px;background:#680222;}
  #preview[data-dbg="brand"] .w-topbar::before{content:".wsu-eit-topbar";}
  #preview[data-dbg="brand"] .w-menu::before{content:".wsu-eit-topbar__menu";}
  #preview[data-dbg="brand"] .w-zone::before{content:"main.wsu-eit-zone";}
  #preview[data-dbg="brand"] .w-banner::before{content:".wsu-eit-banner";}
  #preview[data-dbg="brand"] .w-deck::before{content:".wsu-eit-deck";}
  #preview[data-dbg="brand"] .w-baseline::before{content:".wsu-eit-baseline";}
  #preview[data-dbg="brand"] .w-credit::before{content:".wsu-eit-credit";}

  .segdev button{padding:6px 9px;font-size:11px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:4px;}
  .segdev button span{font-size:12px;}

  .frame-wrap{display:flex;justify-content:center;align-items:flex-start;overflow:hidden;}
  #device{transform-origin:top center;transition:transform .26s ease;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;}
  .bezel{transition:padding .26s ease,border-radius .26s ease,background .26s ease;}
  .frame{background:#fff;border-radius:11px;overflow:hidden;box-shadow:0 10px 34px rgba(30,20,22,.14);border:1px solid #d9d2d3;transition:width .26s ease;flex:0 0 auto;}
  .stand{display:none;}
  /* phone · xs/sm */
  .frame-wrap[data-device="phone"] .bezel{background:#17171a;border-radius:42px;padding:22px 13px 26px;box-shadow:0 18px 44px rgba(20,14,15,.3);position:relative;}
  .frame-wrap[data-device="phone"] .bezel::before{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:74px;height:7px;border-radius:99px;background:#000;}
  .frame-wrap[data-device="phone"] .frame{border-radius:26px;border:none;box-shadow:none;}
  .frame-wrap[data-device="phone"] .frame__bar{display:none;}
  /* tablet · md */
  .frame-wrap[data-device="tablet"] .bezel{background:#1a1a1e;border-radius:28px;padding:26px 22px;box-shadow:0 18px 44px rgba(20,14,15,.28);position:relative;}
  .frame-wrap[data-device="tablet"] .bezel::before{content:"";position:absolute;top:11px;left:50%;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;background:#000;box-shadow:inset 0 0 0 2px #2e2e34;}
  .frame-wrap[data-device="tablet"] .frame{border-radius:14px;border:none;box-shadow:none;}
  .frame-wrap[data-device="tablet"] .frame__bar{display:none;}
  /* laptop · lg */
  .frame-wrap[data-device="laptop"] .bezel{background:#23232a;border-radius:16px 16px 0 0;padding:15px 15px 13px;box-shadow:0 16px 40px rgba(20,14,15,.26);}
  .frame-wrap[data-device="laptop"] .frame{border-radius:7px;border:none;box-shadow:none;}
  .frame-wrap[data-device="laptop"] .stand{display:block;width:calc(100% + 110px);height:17px;background:linear-gradient(#3c3c45,#2a2a31);border-radius:0 0 15px 15px;position:relative;}
  .frame-wrap[data-device="laptop"] .stand::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:6px;border-radius:0 0 8px 8px;background:#1d1d22;}
  /* monitor · xl */
  .frame-wrap[data-device="monitor"] .bezel{background:#101013;border-radius:10px;padding:16px;box-shadow:0 16px 40px rgba(20,14,15,.26);}
  .frame-wrap[data-device="monitor"] .frame{border-radius:4px;border:none;box-shadow:none;}
  .frame-wrap[data-device="monitor"] .stand{display:block;width:30px;height:42px;background:#1b1b1f;position:relative;}
  .frame-wrap[data-device="monitor"] .stand::after{content:"";position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);width:190px;height:10px;border-radius:6px;background:#1b1b1f;}
  .frame-wrap[data-device="monitor"] #device{padding-bottom:12px;}
  /* tv · xxl */
  .frame-wrap[data-device="tv"] .bezel{background:#000;border-radius:9px;padding:12px;box-shadow:0 18px 48px rgba(0,0,0,.34);}
  .frame-wrap[data-device="tv"] .frame{border-radius:3px;border:none;box-shadow:none;}
  .frame-wrap[data-device="tv"] .frame__bar{display:none;}
  .frame-wrap[data-device="tv"] .stand{display:block;width:58%;height:16px;background:linear-gradient(to right,#17171a 0 14px,transparent 14px calc(100% - 14px),#17171a calc(100% - 14px));}
  .dev-caption{text-align:center;font-size:11.5px;color:var(--mute-stage);margin:13px 0 0;}
  .dev-caption b{color:var(--ink);font-weight:600;}
  .dev-caption code{font-family:var(--mono);}
  .dev-caption .bs{background:#f0f0f1;border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-family:var(--mono);font-size:10.5px;margin-left:4px;}
  .dev-caption .scaled{color:#8c6a00;}
  .frame__bar{height:38px;background:#f1eeee;border-bottom:1px solid #e2dadb;display:flex;align-items:center;gap:9px;padding:0 13px;}
  .frame__dots{display:flex;gap:7px;}
  .frame__dots span{width:11px;height:11px;border-radius:50%;}
  .frame__url{flex:1;min-width:0;height:23px;background:#fff;border:1px solid #e2dadb;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:11.5px;color:var(--mute);font-family:var(--mono);white-space:nowrap;overflow:hidden;}
  .frame__scroll{max-height:620px;overflow:auto;}

  .statusbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:13px;font-size:11.5px;color:var(--mute-stage);}
  .statusbar code{font-family:var(--mono);color:#5b5254;}
  .statusbar .path{display:inline-flex;align-items:center;gap:6px;}

  /* ══ RENDERED WSU CHROME (mirrors build.css) ═══════════════════════════ */
  .wp{--w-brand:#a60f2d;--w-flag:#ca1237;--w-deep:#680222;--w-col:75rem;--w-rule:5px;font-family:var(--sans);color:#262626;background:#fff;}
  .wp a{color:#7a0b21;}
  .w-topbar{background:#1f1f1f;border-top:var(--w-rule) solid var(--w-brand);display:flex;align-items:stretch;gap:1.2rem;flex-wrap:wrap;padding:0 1.25rem 0 0;min-height:3.9rem;}
  .w-mark{display:inline-flex;align-items:center;gap:1.05rem;color:#fff;text-decoration:none;}
  .w-crest{display:inline-flex;align-self:stretch;width:3.9rem;padding:.6rem;background:var(--w-brand);}
  .w-crest svg{width:100%;height:100%;fill:#fff;}
  .w-mark__name{font:600 .92rem/1.3 var(--sans);letter-spacing:.14em;color:#fff;}
  .w-menu{margin-left:auto;display:flex;align-items:stretch;}
  .w-menu ul{list-style:none;display:flex;gap:.25rem;align-items:stretch;margin:0;padding:0;}
  .w-menu li{display:flex;}
  .w-menu a{position:relative;display:flex;align-items:center;color:#e8e2e3;text-decoration:none;font-size:.9rem;font-weight:600;padding:.35rem .8rem;}
  .w-menu a::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:var(--w-flag);transform:scaleX(0);transform-origin:left;transition:transform .2s;}
  .w-menu a:hover{color:#fff;}
  .w-menu a:hover::after{transform:scaleX(1);}
  .w-zone{max-width:var(--w-col);margin:0 auto;padding:2.4rem 1.5rem 3rem;}
  .w-deck{background:#262626;color:#cfcfcf;border-top:5px solid var(--w-brand);}
  .w-deck__cols{max-width:var(--w-col);margin:0 auto;padding:2.6rem 1.5rem;display:grid;grid-template-columns:2fr 1fr 1fr;gap:2.4rem;}
  .w-deck h2{margin:0 0 .8rem;font:800 1.1rem var(--sans);color:#fff;text-transform:uppercase;letter-spacing:.04em;}
  .w-deck p{margin:0 0 .8rem;font-size:.92rem;line-height:1.6;}
  .w-deck ul{list-style:none;margin:0;padding:0;}
  .w-deck li{margin:0 0 .55rem;}
  .w-deck a{color:#fff;font-size:.92rem;text-decoration:underline;text-decoration-color:rgba(255,255,255,.35);text-underline-offset:.2em;}
  .w-baseline{background:#111;display:flex;align-items:center;justify-content:space-between;gap:1.2rem;flex-wrap:wrap;padding:.7rem 1.5rem;font-size:.8rem;color:#b3b3b3;}
  .w-baseline__menu ul{list-style:none;display:flex;flex-wrap:wrap;gap:1.2rem;margin:0;padding:0;}
  .w-baseline__menu a{color:#e3e3e3;font-size:.8rem;text-decoration:none;}
  .w-credit{color:#8a8a8a;}
  .wp.narrow .w-deck__cols{grid-template-columns:1fr;gap:1.6rem;}
  .wp.narrow .w-menu{margin-left:0;width:100%;}

  /* template banner (real .wsu-eit-banner) */
  .w-banner{background:linear-gradient(100deg,var(--w-brand) 0%,var(--w-brand) 55%,var(--w-deep) 100%);color:#fff;border-radius:8px;padding:1.6rem 1.8rem;margin:0 0 1.6rem;}
  .w-banner .wb-kicker{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:0 0 .35rem;color:rgba(255,255,255,.85);}
  .w-banner h2{margin:0 0 .4rem;font:800 1.6rem var(--sans);color:#fff;border:0;}
  .w-banner p{margin:0;color:rgba(255,255,255,.92);max-width:60ch;font-size:.98rem;line-height:1.55;}
  .w-banner .wb-btn{display:inline-block;margin-top:1rem;background:#fff;color:var(--w-brand);font-weight:600;font-size:.92rem;padding:.6rem 1.4rem;border-radius:5px;text-decoration:none;}

  /* content-zone mock widgets (illustrate Slate-injected page content) */
  .z-tag{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9c9092;background:#f0ebec;border-radius:4px;padding:2px 7px;margin:0 0 1rem;}
  .z-h1{font:800 2.4rem/1.1 var(--sans);color:#262626;margin:0 0 .3rem;position:relative;padding-bottom:.5rem;}
  .z-h1::after{content:"";position:absolute;left:0;bottom:0;width:3.5rem;height:4px;background:var(--w-brand);}
  .z-intro{font-size:1.05rem;color:#595959;line-height:1.6;margin:0 0 1.8rem;max-width:60ch;}
  .z-card{border:1px solid #e0dadb;border-radius:11px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .z-card.pad{padding:1.3rem 1.4rem;}
  .z-head{padding:.9rem 1.2rem;border-bottom:1px solid #ececec;font-weight:700;font-size:.95rem;}
  .z-checkrow{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.85rem 1.2rem;border-bottom:1px solid #f1eded;}
  .z-checkrow:last-child{border-bottom:none;}
  .z-checkrow b{font-size:.95rem;font-weight:600;}
  .z-checkrow small{display:block;color:#7a7275;font-size:.82rem;margin-top:.1rem;}
  .z-badge{font-size:.72rem;font-weight:700;padding:.28rem .6rem;border-radius:999px;white-space:nowrap;}
  .z-badge.done{background:#eef7d8;color:#3f5b0a;}
  .z-badge.wait{background:#ffe9de;color:#9c3a00;}
  .z-badge.todo{background:#fbebee;color:#8a0019;}
  .z-frow{margin-bottom:1rem;}
  .z-flab{display:block;font-size:.875rem;font-weight:500;margin-bottom:.35rem;}
  .z-req{color:var(--w-flag);}
  .z-input{width:100%;font-family:inherit;font-size:1rem;padding:.7rem .8rem;border:1px solid #ccc;border-radius:5px;background:#fff;}
  .z-actions{display:flex;justify-content:flex-end;gap:.7rem;margin-top:.4rem;}
  .z-btn{font-family:inherit;font-weight:600;font-size:.95rem;padding:.7rem 1.6rem;border-radius:5px;border:none;background:var(--w-brand);color:#fff;cursor:pointer;}
  .z-btn.ghost{background:#fff;color:var(--w-brand);border:1px solid #cfa9b0;}
  .z-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.9rem;}
  .z-drop{border:2px dashed #d4cccd;border-radius:10px;padding:1.3rem;text-align:center;background:#fbfafa;}
  .z-drop .ico{font-size:1.6rem;color:#b0a7a9;}
  .z-drop b{display:block;font-size:.92rem;margin-top:.4rem;}
  .z-drop small{display:block;font-size:.8rem;color:#8a7e80;margin:.25rem 0 .8rem;}

  /* export drawer */
  .scrim{position:fixed;inset:0;background:rgba(20,14,15,.46);z-index:40;}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(760px,96vw);background:#14100f;z-index:50;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.4);}
  .drawer__top{flex:0 0 auto;padding:15px 18px;border-bottom:1px solid #2a2422;display:flex;align-items:center;gap:11px;}
  .drawer__top .ti{flex:1;min-width:0;}
  .drawer__top .ti b{display:block;font-size:14px;color:#f2ece9;}
  .drawer__top .ti span{font-size:12px;color:#a99f9c;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dbtn{padding:8px 13px;background:#241d1b;color:#e0d6d3;border:1px solid #3a302d;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .dbtn:hover{background:#2c2321;}
  .dbtn.go{background:var(--crimson);border-color:var(--crimson);color:#fff;}
  .dbtn.go:hover{background:var(--crimson-deep);}
  .dbtn.x{width:34px;padding:8px 0;text-align:center;}
  .drawer__tabs{flex:0 0 auto;display:flex;gap:6px;padding:10px 18px;border-bottom:1px solid #2a2422;background:#0e0b0a;}
  .drawer__tabs button{background:transparent;border:1px solid #2a2422;color:#a99f9c;font-size:12px;font-weight:600;padding:7px 13px;border-radius:7px;cursor:pointer;font-family:inherit;}
  .drawer__tabs button.on{background:#241d1b;color:#fff;border-color:#4a3d3a;}
  .drawer__note{padding:9px 18px;font-size:11.5px;color:#a99f9c;line-height:1.5;border-bottom:1px solid #2a2422;background:#0e0b0a;}
  .drawer__note code{color:#9cc3e6;}
  .codewrap{flex:1;overflow:auto;display:flex;align-items:flex-start;font-family:var(--mono);font-size:12px;line-height:1.55;}
  .gutter{flex:0 0 auto;text-align:right;padding:16px 10px 16px 16px;color:#6a5d5a;user-select:none;white-space:pre;border-right:1px solid #2a2422;background:#100d0c;position:sticky;left:0;}
  .code{margin:0;padding:16px 18px;white-space:pre;color:#cfc6c3;flex:1;}
  .code .c-decl{color:#7d8a72;}
  .code .c-com{color:#7d8a72;font-style:italic;}
  .code .c-tag{color:#e58aa0;}
  .code .c-attr{color:#d9b38c;}
  .code .c-str{color:#9cc7a0;}

  /* utilities · help · reduced motion */
  .vh{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;}
  @media (prefers-reduced-motion:reduce){*{transition-duration:.001ms!important;animation-duration:.001ms!important;}}
  .darkbtn{background:#fff;border:1px solid var(--line);color:#1e1e1e;font-size:12px;font-weight:600;padding:7px 12px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .darkbtn:hover{border-color:#949494;}
  .darkbtn[aria-pressed="true"]{background:var(--crimson);border-color:var(--crimson);color:#fff;}
  .help-panel{display:none;background:#f0f6fc;border:1px solid #c5d9ed;border-radius:4px;padding:10px 12px;margin:0 0 13px;font-size:11.5px;line-height:1.55;color:#1e3a5f;}
  body.help-on .help-panel{display:block;}
  .help-panel code{background:#dce9f6;padding:1px 5px;border-radius:4px;font-size:10.5px;}
  .help-panel b{color:var(--crimson);}
  .help-panel p{margin:0 0 7px;}
  .help-panel p:last-child{margin-bottom:0;}
  .kbd{font-family:var(--mono);font-size:10.5px;background:#efeaeb;border:1px solid #ddd4d5;border-bottom-width:2px;border-radius:4px;padding:1px 5px;color:#5b5254;}

  /* info (i) buttons + shared tooltip */
  .info{width:16px;height:16px;border-radius:50%;border:1px solid #b7bcc2;background:transparent;color:#6a7078;font:700 10px/1 var(--ui);cursor:help;display:inline-flex;align-items:center;justify-content:center;padding:0;flex:0 0 auto;vertical-align:middle;transition:color .12s,border-color .12s;}
  .info:hover,.info:focus-visible{color:var(--crimson);border-color:var(--crimson);outline:none;}
  .info:focus-visible{box-shadow:0 0 0 3px rgba(34,113,177,.32);}
  .cap-info{display:inline-flex;align-items:center;gap:6px;}
  .ui-tip{position:fixed;z-index:120;max-width:270px;background:#1e1e1e;color:#f3f3f3;font:400 11.5px/1.55 var(--ui);padding:9px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.14);box-shadow:0 8px 24px rgba(0,0,0,.28);opacity:0;visibility:hidden;transition:opacity .12s;pointer-events:none;}
  .ui-tip.show{opacity:1;visibility:visible;}
  .ui-tip b{color:#fff;}
  .drawer .info{border-color:#5a5052;color:#c9c0c2;}
  .drawer .info:hover,.drawer .info:focus-visible{border-color:#8fbce6;color:#8fbce6;}
  .reset-sec{background:none;border:none;color:var(--crimson);font-size:11px;font-weight:600;cursor:pointer;padding:2px 0;display:inline-flex;align-items:center;gap:4px;}
  .reset-sec:hover{text-decoration:underline;}
  .reset-sec:focus-visible{outline:2px solid var(--crimson);outline-offset:2px;border-radius:3px;}
  .sec-toolbar{display:flex;justify-content:flex-end;margin:0 0 10px;}
  .skip-tool{position:fixed;left:10px;top:-48px;z-index:200;background:var(--crimson);color:#fff;font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:0 0 7px 7px;text-decoration:none;transition:top .15s;}
  .skip-tool:focus{top:0;outline:2px solid #fff;outline-offset:-4px;}
  @media (max-width:900px){aside{width:308px;}}
</style>
</head>
<body>

<a class="skip-tool" href="#stage">Skip to preview</a>
<a class="skip-tool" href="#sidebar">Skip to settings</a>

<header class="appbar" role="banner">
  <div class="appbar__brand">
    <span class="appbar__crest" id="appCrest" aria-hidden="true"></span>
    <span class="appbar__title"><h1>Slate XSLT Generator</h1><span>WSU · EIT FreeSlate</span></span>
  </div>
  <div class="appbar__spacer"></div>
  <div class="appbar__doc" aria-hidden="true"><span class="appbar__doc-ic">▤</span><span id="appDocPath">/shared/build.xslt</span></div>
  <div class="appbar__spacer"></div>
  <div class="appbar__tools">
    <button class="preflight ok" id="preflightBtn" aria-label="Preflight: all clear. Opens the checklist." data-tip="Preflight scans every setting for problems that would ship broken — empty labels, placeholder https:// links, a bad cache date. We surface it here because one malformed build.xslt breaks every external page, not just this one. Click to jump to the checklist.">✓ Ready</button>
    <div class="seg segdev" id="deviceSeg" role="group" aria-label="Preview viewport size">
      <button data-dev="xs"  aria-pressed="false" data-tip="Phone · 360px · Bootstrap xs (under 576)"><span aria-hidden="true">📱</span> XS</button>
      <button data-dev="sm"  aria-pressed="false" data-tip="Large phone · 576px · Bootstrap sm (≥576)">SM</button>
      <button data-dev="md"  aria-pressed="false" data-tip="Tablet · 768px · Bootstrap md (≥768)"><span aria-hidden="true">📟</span> MD</button>
      <button data-dev="lg"  class="on" aria-pressed="true" data-tip="Laptop / small monitor · 992px · Bootstrap lg (≥992)"><span aria-hidden="true">💻</span> LG</button>
      <button data-dev="xl"  aria-pressed="false" data-tip="Desktop · 1200px · Bootstrap xl (≥1200)"><span aria-hidden="true">🖥</span> XL</button>
      <button data-dev="xxl" aria-pressed="false" data-tip="Large monitor / TV · 1440px · Bootstrap xxl (≥1400)"><span aria-hidden="true">📺</span> XXL</button>
    </div>
    <button class="info" type="button" aria-label="More information" data-tip="These match Bootstrap’s six responsive breakpoints (xs–xxl). The WSU chrome is fluid, so checking each width catches layout breaks before applicants hit them on a phone or a lecture-hall TV. Wide sizes scale to fit your screen.">i</button>
    <label class="field-inline">Example
      <select id="presetSel" aria-label="Load an example configuration" data-tip="Loads a ready-made configuration (status portal, application form, event page) so you can see a realistic result instantly instead of starting from a blank template. It only fills the fields — nothing is published."><option value="">Load…</option></select>
    </label>
    <button class="darkbtn" id="helpBtn" aria-pressed="false" aria-label="Toggle help hints throughout the panel" data-tip="Toggles the inline help notes inside every Settings section — each explains what that control writes into the XSLT and why. Turn it on while you’re learning; off once it’s second nature.">? Help</button>
    <button class="btn-primary" id="viewBtn" data-tip="Opens the generated XSLT so you can read, copy, or download it. Nothing here touches Slate directly — you paste the file into your Slate template, which is why we keep generation and publishing separate.">&lt;/&gt;&ensp;View XSLT</button>
  </div>
</header>

<div class="work">
  <aside aria-label="Template settings"><div class="aside-pad" id="sidebar" tabindex="-1"></div></aside>
  <main class="stage" id="stage" tabindex="-1" aria-label="Live preview">
    <div class="stage-inner">
      <div class="stage-tools">
        <div class="blk">
          <span class="cap cap-info">Content zone preview <button class="info" type="button" aria-label="More information" data-tip="Slate injects a different page into each area (status portal, application form, event page). This picker swaps the mock content so you can confirm the shared chrome frames every one of them correctly. It changes the preview only.">i</button></span>
          <select id="areaSel" aria-label="Content zone to preview"></select>
        </div>
        <div class="blk grow">
          <span class="cap cap-info">Page heading <button class="info" type="button" aria-label="More information" data-tip="A stand-in headline so the preview looks real. Slate supplies the actual heading at runtime, so this text is never written into the XSLT — change it freely to sanity-check spacing and wrapping.">i</button></span>
          <input id="areaHeading" type="text" aria-label="Preview page heading" />
        </div>
        <div class="blk grow">
          <span class="cap cap-info">Intro line <button class="info" type="button" aria-label="More information" data-tip="Same as the heading — a placeholder sentence for the preview only. It helps you judge line length and rhythm under the title, but Slate owns this copy in production.">i</button></span>
          <input id="areaIntro" type="text" aria-label="Preview intro line" />
        </div>
      </div>
      <p class="preview-note">Heading &amp; intro are <b>preview only</b> — they stand in for the content Slate injects, and are never written into the XSLT.</p>
      <div class="debugbar" role="group" aria-label="Debug and wireframe views">
        <span class="cap cap-info">Debug view <button class="info" type="button" aria-label="More information" data-tip="Overlays that x-ray the preview so you can verify structure, not just looks: strip it to wireframe boxes, outline every element, label the HTML regions, drop a 12-column grid, or reveal the wsu-eit-* brand classes. Overlays affect the preview only — never the exported code.">i</button></span>
        <div class="seg segdbg" id="debugSeg">
          <button data-dbg="off" class="on" aria-pressed="true">Off</button>
          <button data-dbg="wire" aria-pressed="false" data-tip="Strips color and imagery to grey boxes so you can judge pure structure and hierarchy — like a lo-fi wireframe of the exported markup.">Wireframe</button>
          <button data-dbg="outline" aria-pressed="false" data-tip="Outlines every element, colored by nesting depth. Good for spotting stray wrappers and unexpected nesting.">Outlines</button>
          <button data-dbg="labels" aria-pressed="false" data-tip="Tags each region with its HTML tag + class, and marks where Slate injects content.">Components</button>
          <button data-dbg="grid" aria-pressed="false" data-tip="A 12-column Bootstrap-style reference grid (24px gutters). The column count is constant at every breakpoint — only col-* spans change.">12-col grid</button>
          <button data-dbg="brand" aria-pressed="false" data-tip="Reveals which wsu-eit-* brand classes each region ships with in the exported XSLT — the hooks build.css styles.">Brand classes</button>
        </div>
        <span class="dbg-hint" id="dbgHint" role="status" aria-live="polite"></span>
      </div>
      <div class="frame-wrap" id="frameWrap" data-device="laptop">
        <div id="device">
          <div class="bezel" id="bezel">
            <div class="frame" id="frame">
              <div class="frame__bar">
                <div class="frame__dots"><span style="background:#fc5c54"></span><span style="background:#fdbc40"></span><span style="background:#34c749"></span></div>
                <div class="frame__url" id="frameUrl"></div>
              </div>
              <div class="frame__scroll"><div class="wp" id="preview"></div></div>
            </div>
          </div>
          <div class="stand" aria-hidden="true"></div>
        </div>
      </div>
      <p class="dev-caption" id="devCaption" role="status" aria-live="polite"></p>
      <div class="statusbar">
        <span class="path">Target&ensp;<code id="statusPath">/shared/build.xslt</code></span>
        <span id="statusChecks" role="status" aria-live="polite"></span>
      </div>
    </div>
  </main>
</div>

<div id="drawerHost"></div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   Slate XSLT Generator — WSU EIT · v5.0
   Self-contained. Edits header / footer / nav / tokens / per-area banner,
   previews the exact deployed WSU chrome, and emits a paste-ready
   /shared/build.xslt that is STRUCTURALLY IDENTICAL to the real one
   (framework contract + identity template preserved verbatim). No build

function tokenOverride(){
  const t=state.tokens, d=defaultState().tokens, lines=[];
  if(t.brand!==d.brand)         lines.push('          --wsu-eit-brand: '+t.brand+';');
  if(t.brandDeep!==d.brandDeep) lines.push('          --wsu-eit-brand-deep: '+t.brandDeep+';');
  if(t.flag!==d.flag)           lines.push('          --wsu-eit-flag: '+t.flag+';');
  if(t.body!==d.body)           lines.push('          --wsu-eit-body: '+t.body+';');
  if(+t.rule!==d.rule)          lines.push('          --wsu-eit-topbar-rule: '+t.rule+'px;');
  if(+t.col!==d.col)            lines.push('          --wsu-eit-col: '+t.col+'rem;');
  if(!lines.length) return '';
  return `
        <!-- Per-template token override (generator). Only the values changed
             from the defaults are written; everything else inherits build.css.
             Tip: leave brand-deep unset and build.css re-derives it from the
             crimson via color-mix. -->
        <style>:root {
${lines.join('\n')}
        }</style>`;
}

function genTopbar(){
  if(!state.showTopbar) return '          <!-- topbar hidden by generator -->';
  const items = state.nav.map(n=>'                <li><a href="'+esc(n.href)+'">'+escText(n.label)+'</a></li>').join('\n');
  return [
'          <header class="wsu-eit-topbar">',
'            <a class="wsu-eit-mark" href="'+esc(state.markLink)+'">',
'              <span class="wsu-eit-mark__crest" aria-hidden="true">',
'                '+CREST_SVG,
'              </span>',
'              <span class="wsu-eit-mark__name">'+escText(state.markName)+'</span>',
'            </a>',
'            <nav class="wsu-eit-topbar__menu" aria-label="University quick links">',
'              <ul>',
items,
'              </ul>',
'            </nav>',
'          </header>'
  ].join('\n');
}

function genBanner(){
  const b=CC().banner; if(!b||!b.on) return '';
  const p=[];
  if(b.kicker) p.push('              <p class="wsu-eit-banner__kicker">'+escText(b.kicker)+'</p>');
  if(b.title)  p.push('              <h2>'+escText(b.title)+'</h2>');
  if(b.text)   p.push('              <p>'+escText(b.text)+'</p>');
  if(b.cta && b.href) p.push('              <a class="wsu-eit-btn" href="'+esc(b.href)+'">'+escText(b.cta)+'</a>');
  if(!p.length) return '';
  return ['            <!-- Template banner: static, rendered above the injected page content -->',
          '            <div class="wsu-eit-banner">'].concat(p).concat(['            </div>']).join('\n');
}

function genZoneBlock(){
  const b=genBanner();
  const L=['          <!-- Slate injects the page (form / event / portal) below.',
           '               main.wsu-eit-zone is the single styling hook build.css scopes to. -->',
           '          <main id="wsu-eit-main" class="wsu-eit-zone" tabindex="-1">'];
  if(b) L.push(b);
  L.push('            <xsl:apply-templates select="xhtml:html/xhtml:body/node()" />');
  L.push('          </main>');
  return L.join('\n');
}

function genDeckCol(col){
  if(col.kind==='address'){
    const bodyHtml = escText(col.body).split('\n').filter(l=>l.trim()!=='').join('<br />');

    if(col.phone) contact.push('Call or text: <a href="'+esc(telHref(col.phone))+'">'+escText(col.phone)+'</a>');
    if(col.email) contact.push('Email: <a href="mailto:'+esc(col.email)+'">'+escText(col.email)+'</a>');
    if(col.hours) contact.push(escText(col.hours));
    return [
'              <div>',
'                <h2>'+escText(col.heading)+'</h2>',
'                <p>'+bodyHtml+'</p>',
      contact.length?'                <p>'+contact.join('<br />')+'</p>':'',
'              </div>'
    ].filter(Boolean).join('\n');
  }
  const items = col.links.map(l=>'                  <li><a href="'+esc(l.href)+'">'+escText(l.label)+'</a></li>').join('\n');
  return [
'              <div>',
'                <h2>'+escText(col.heading)+'</h2>',
'                <ul>',
items,
'                </ul>',
'              </div>'
  ].join('\n');
}

/* ── syntax highlighter (operates on the ASCII, entity-encoded output) ────── */
function escHL(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hlTag(t){
  let s=escHL(t);
  s=s.replace(/^(&lt;\/?)([A-Za-z][\w:.-]*)/, (m,p,n)=>p+'<span class="c-tag">'+n+'</span>');
  s=s.replace(/([\w:.-]+)=(&quot;[\s\S]*?&quot;)/g, (m,a,v)=>'<span class="c-attr">'+a+'</span>=<span class="c-str">'+v+'</span>');
  return s;
}
function highlight(code){
  const re=/<\?[\s\S]*?\?>|<!--[\s\S]*?-->|<\/?[A-Za-z][\w:.-]*(?:"[^"]*"|'[^']*'|[^<>])*?>/g;
  let out='', i=0, m;
  while((m=re.exec(code))){
    out+=escHL(code.slice(i,m.index));
    const tok=m[0];
    if(tok.slice(0,2)==='<?') out+='<span class="c-decl">'+escHL(tok)+'</span>';
    else if(tok.slice(0,4)==='<!--') out+='<span class="c-com">'+escHL(tok)+'</span>';
    else out+=hlTag(tok);
    i=re.lastIndex;
  }
  out+=escHL(code.slice(i));
  return out;
}

/* ════════════════ VALIDATION ══════════════════════════════════════════════ */
function validate(){
  const out=[], push=(lvl,msg)=>out.push({lvl,msg});
  const placeholder = h => !h || !h.trim() || h.trim()==='https://';
  const checkLinks=(arr,where)=>arr.forEach(n=>{
    if(!n.label || !n.label.trim()) push('warn', where+': a link has no label.');
    if(placeholder(n.href)) push('warn', where+': “'+((n.label||'').trim()||'untitled')+'” has no URL.');
  });
  if(state.showTopbar){
    if(!state.markName.trim()) push('warn','Wordmark text is empty.');
    checkLinks(state.nav,'Topbar');
  }
  if(state.showDeck){
    if(!state.cols.length) push('warn','Footer deck is shown but has no columns — it will render as an empty dark band.');
    state.cols.forEach(c=>{
    const name='“'+((c.heading||'').trim()||'untitled')+'”';
    if(!c.heading.trim()) push('warn','Footer: a column has no heading.');
    if(c.kind==='links'){ if(!c.links.length) push('warn','Footer '+name+' has no links.'); checkLinks(c.links,'Footer '+name); }
    else if(!c.body.trim()) push('warn','Footer '+name+' address block is empty.');
  });}
  if(state.showBaseline) checkLinks(state.baselineNav,'Baseline');
  if(!/^\d{8}$/.test(state.version)) push('warn','Cache stamp should be 8 digits (YYYYMMDD).');
  const b=CC().banner;
  if(b && b.on){
    if(!b.title.trim()) push('warn','Template banner is on but has no title.');
    if(b.cta.trim() && placeholder(b.href)) push('warn','Banner button has no URL.');
  }
  return out;
}
function updateChecks(){
  const issues=validate();
  const pill=document.getElementById('preflightBtn');
  if(pill){
    pill.className='preflight '+(issues.length?'warn':'ok');
    pill.textContent = issues.length ? '⚠ '+issues.length+(issues.length===1?' check':' checks') : '✓ Ready';
    pill.setAttribute('aria-label', (issues.length ? issues.length+' preflight '+(issues.length===1?'check':'checks')+' to review.' : 'Preflight: all clear.')+' Opens the checklist.');
  }
  const body=document.getElementById('pf-body');
  if(body) body.innerHTML = issues.length
    ? issues.map(x=>'<li class="pf-item '+x.lvl+'">'+esc(x.msg)+'</li>').join('')
    : '<li class="pf-item ok">All checks pass — ready to publish.</li>';
  const cnt=document.getElementById('pf-count');
  if(cnt){ cnt.textContent=issues.length||''; cnt.className='pf-count '+(issues.length?'warn':'ok'); }
  const sc=document.getElementById('statusChecks');
  if(sc) sc.innerHTML = issues.length ? '<span style="color:var(--warn)">⚠ '+issues.length+' to review</span>' : '<span style="color:var(--ok)">✓ ready to publish</span>';
}

function bannerPreview(){

  if(b.kicker) p.push('<p class="wb-kicker">'+escText(b.kicker)+'</p>');
  if(b.title)  p.push('<h2>'+escText(b.title)+'</h2>');

function previewCol(col){
  if(col.kind==='address'){
    const body = escText(col.body).split('\n').filter(l=>l.trim()).join('<br>');
    const contact=[];
    if(col.phone) contact.push('Call or text: <a href="#" onclick="return false">'+escText(col.phone)+'</a>');

    return `<div><h2>${escText(col.heading)}</h2><p>${body}</p>${contact.length?`<p>${contact.join('<br>')}</p>`:''}</div>`;
  }
  return `<div><h2>${escText(col.heading)}</h2><ul>${col.links.map(l=>`<li><a href="#" onclick="return false">${escText(l.label)}</a></li>`).join('')}</ul></div>`;

  host.innerHTML = `
    <div class="scrim" data-act="closeDrawer"></div>
    <div class="drawer" role="dialog" aria-modal="true" aria-label="Generated XSLT">
      <div class="drawer__top">
        <div class="ti"><b>Generated XSLT ${info('This drawer just shows the file the generator built from your settings. Nothing here is live — you copy or download it, then paste it into your Slate template. Keeping generation and publishing separate means you can review the exact markup before it touches any real page.')}</b><span>${esc(target)}</span></div>
        <button class="dbtn go" data-act="copy" data-tip="Copies the full XSLT to your clipboard so you can paste it straight into Slate’s template editor. This is the usual path — no file to manage.">${copied?'Copied ✓':'Copy'}</button>
        <button class="dbtn" data-act="download" data-tip="Saves the XSLT as a .xslt file named after its path. Use this when you keep templates in version control or hand them off to someone else.">Download</button>
        <button class="dbtn x" data-act="closeDrawer" aria-label="Close">✕</button>
      </div>
      <div class="drawer__tabs" role="group" aria-label="Export mode">
        <button class="${exportMode==='full'?'on':''}" data-act="mode" data-v="full" aria-pressed="${exportMode==='full'}" data-tip="The complete, paste-ready build.xslt for this step — replaces the whole file. Use this for a new page or a full rebuild.">Full build.xslt</button>
        <button class="${exportMode==='snippet'?'on':''}" data-act="mode" data-v="snippet" aria-pressed="${exportMode==='snippet'}" data-tip="Just the WSU chrome (header, footer, baseline) as a fragment to drop into an existing build.xslt. Use this when a file already has custom logic you don’t want to overwrite.">Chrome fragment</button>
      </div>
      <div class="drawer__note">${exportMode==='full'
        ? 'Paste-ready global page template. Replaces <code>/shared/'+esc(currentFile())+'</code>. The framework <code>&lt;template&gt;</code> line, the body hand-off, and the identity template are preserved verbatim.'
        : 'A chrome-only fragment to drop inside an existing <code>build.xslt</code> — use when you do not want to replace the whole file.'}</div>
      <div class="codewrap"><div class="gutter">${gutter}</div><pre class="code">${highlight(code)}</pre></div>
    </div>`;
  const go=host.querySelector('.dbtn.go'); if(go) go.focus();
}

/* ════════════════ EVENTS ══════════════════════════════════════════════════ */
function rerender(full){ save(); if(full) renderSidebar(); renderPreview(); if(drawerOpen) renderDrawer(); }
function softUpdate(){ renderPreview(); if(drawerOpen) renderDrawer(); save(); }

document.addEventListener('input', e=>{
  const el=e.target, act=el.getAttribute('data-act'); if(!act) return;
  if(act==='field'){ state[el.getAttribute('data-k')]=el.value; softUpdate(); }
  else if(act==='edit'){ const s=el.getAttribute('data-scope'), id=el.getAttribute('data-id'), k=el.getAttribute('data-k'); const arr=s==='nav'?state.nav:state.baselineNav; const it=arr.find(x=>x.id===id); if(it){ it[k]=el.value; softUpdate(); } }
  else if(act==='colf'){ const c=state.cols.find(x=>x.id===el.getAttribute('data-cid')); if(c){ c[el.getAttribute('data-k')]=el.value; softUpdate(); } }
  else if(act==='colllabel'){ const c=state.cols.find(x=>x.id===el.getAttribute('data-cid')); const l=c&&c.links.find(x=>x.id===el.getAttribute('data-id')); if(l){ l[el.getAttribute('data-k')]=el.value; softUpdate(); } }
  else if(act==='bannerf'){ CC().banner[el.getAttribute('data-k')]=el.value; softUpdate(); }
  else if(act==='tok'){ state.tokens[el.getAttribute('data-k')]=+el.value; rerender(true); }
  else if(act==='tokcolor'||act==='tokhex'){ const k=el.getAttribute('data-k'); let v=el.value.trim();
    if(act==='tokhex'){ if(!/^#?[0-9a-fA-F]{6}$/.test(v)) return; if(v[0]!=='#') v='#'+v; }
    state.tokens[k]=v; softUpdate(); document.querySelectorAll('[data-k="'+k+'"][data-act^="tok"]').forEach(o=>{ if(o!==el&&(o.type==='color'||o.classList.contains('hex'))) o.value=v; }); }
});

document.addEventListener('change', e=>{
  const el=e.target, act=el.getAttribute('data-act'); if(!act) return;
  if(act==='flag'){ state[el.getAttribute('data-k')]=el.checked; rerender(true); }
  else if(act==='bannerflag'){ CC().banner.on=el.checked; rerender(true); }
  else if(act==='area'){ setArea(el.value); }
});

document.addEventListener('click', e=>{
  const b=e.target.closest('[data-act]'); if(!b) return;
  const act=b.getAttribute('data-act'), cid=b.getAttribute('data-cid'), id=b.getAttribute('data-id');
  switch(act){
    case 'navadd': state.nav.push({id:nid(),label:'New link',href:'https://'}); rerender(true); break;
    case 'bnavadd': state.baselineNav.push({id:nid(),label:'New link',href:'https://'}); rerender(true); break;
    case 'up': { const arr=b.getAttribute('data-scope')==='nav'?state.nav:state.baselineNav; moveRow(arr,id,-1); rerender(true); break; }
    case 'down': { const arr=b.getAttribute('data-scope')==='nav'?state.nav:state.baselineNav; moveRow(arr,id,1); rerender(true); break; }
    case 'del': { const s=b.getAttribute('data-scope'); if(s==='nav') state.nav=state.nav.filter(x=>x.id!==id); else state.baselineNav=state.baselineNav.filter(x=>x.id!==id); rerender(true); break; }
    case 'coladd': state.cols.push({id:nid(),heading:'New column',kind:'links',body:'',phone:'',email:'',hours:'',links:[{id:nid(),label:'Link',href:'https://'}]}); rerender(true); break;
    case 'coldel': state.cols=state.cols.filter(x=>x.id!==cid); rerender(true); break;
    case 'colup': moveRow(state.cols,cid,-1); rerender(true); break;
    case 'coldown': moveRow(state.cols,cid,1); rerender(true); break;
    case 'colkind': { const c=state.cols.find(x=>x.id===cid); if(c){ c.kind=b.getAttribute('data-v'); if(c.kind==='links'&&!c.links.length) c.links=[{id:nid(),label:'Link',href:'https://'}]; rerender(true); } break; }
    case 'colladd': { const c=state.cols.find(x=>x.id===cid); if(c){ c.links.push({id:nid(),label:'Link',href:'https://'}); rerender(true); } break; }
    case 'colldel': { const c=state.cols.find(x=>x.id===cid); if(c){ c.links=c.links.filter(x=>x.id!==id); rerender(true); } break; }
    case 'stamp': { const d=new Date(); state.version=''+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); rerender(true); break; }
    case 'resetsec': { const d=defaultState(), sec=b.getAttribute('data-sec');
      if(sec==='header'){ state.markName=d.markName; state.markLink=d.markLink; state.nav=d.nav; }
      else if(sec==='deck'){ state.cols=d.cols; }
      else if(sec==='baseline'){ state.baselineNav=d.baselineNav; state.copyright=d.copyright; state.credit=d.credit; }
      rerender(true); break; }
    case 'reset': if(confirm('Reset all fields to the WSU defaults?')){ state=defaultState(); syncAreaInputs(); rerender(true); } break;
    case 'closeDrawer': closeDrawer(); break;
    case 'mode': exportMode=b.getAttribute('data-v'); renderDrawer(); break;
    case 'copy': copyText(genCode()); break;
    case 'download': { const slug = exportMode==='full' ? currentFile().replace(/\//g,'-') : 'chrome-fragment.xslt'; const blob=new Blob([genCode()],{type:'application/xml'}); const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=slug; a.click(); URL.revokeObjectURL(u); break; }
  }
  /* keep keyboard focus after full re-renders (reorder / add / delete) */
  if(act==='up'||act==='down'||act==='colup'||act==='coldown'){
    const sel='[data-act="'+act+'"]'+(id?'[data-id="'+id+'"]':'')+(cid?'[data-cid="'+cid+'"]':'');
    const nb=document.querySelector(sel); if(nb) nb.focus();
  } else if(act==='del'){
    const s=b.getAttribute('data-scope'); const nb=document.querySelector('[data-act="'+(s==='nav'?'navadd':'bnavadd')+'"]'); if(nb) nb.focus();
  } else if(act==='coldel'){
    const nb=document.querySelector('[data-act="coladd"]'); if(nb) nb.focus();
  } else if(act==='colldel'){
    const nb=document.querySelector('[data-act="colladd"][data-cid="'+cid+'"]'); if(nb) nb.focus();
  }
});

/* clipboard with legacy fallback (insecure contexts, older browsers) */
function copyText(t){
  const done=()=>{ copied=true; renderDrawer(); setTimeout(()=>{ copied=false; if(drawerOpen) renderDrawer(); },1400); };
  const legacy=()=>{ const ta=document.createElement('textarea'); ta.value=t; ta.setAttribute('readonly',''); ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); }catch(e){} ta.remove(); done(); };
  if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done, legacy);
  else legacy();
}

function setArea(v){ state.previewArea=v; syncAreaInputs(); rerender(true); const s=document.querySelector('[data-act="area"]'); if(s) s.value=v; document.getElementById('areaSel').value=v; }
function syncAreaInputs(){ document.getElementById('areaHeading').value=CC().heading||''; document.getElementById('areaIntro').value=CC().intro||''; }
function openDrawer(){ lastFocus=document.activeElement; drawerOpen=true; renderDrawer(); }
function closeDrawer(){ drawerOpen=false; renderDrawer(); if(lastFocus&&lastFocus.focus) lastFocus.focus(); }

document.getElementById('deviceSeg').addEventListener('click', e=>{ const btn=e.target.closest('button'); if(!btn) return; device=btn.getAttribute('data-dev'); [...e.currentTarget.children].forEach(c=>{ const on=c===btn; c.classList.toggle('on',on); c.setAttribute('aria-pressed',on); }); renderPreview(); });
window.addEventListener('resize', applyDevice);
document.getElementById('frameWrap').addEventListener('transitionend', e=>{ if(e.propertyName==='width'||e.propertyName==='transform'||e.propertyName==='padding') applyDevice(); });

/* ── accessible info tooltips ─────────────────────────────────────────────── */
(function(){
  const tip=document.createElement('div'); tip.className='ui-tip'; tip.id='uiTip'; tip.setAttribute('role','tooltip');
  document.body.appendChild(tip);
  let cur=null;
  function show(el){
    const txt=el.getAttribute('data-tip'); if(!txt) return;
    cur=el; tip.textContent=txt; tip.classList.add('show'); el.setAttribute('aria-describedby','uiTip');
    const r=el.getBoundingClientRect(), tw=tip.offsetWidth, th=tip.offsetHeight, m=8;
    let left=r.left + r.width/2 - tw/2;
    left=Math.max(m, Math.min(left, innerWidth-tw-m));
    let top=r.bottom+8; if(top+th > innerHeight-m) top=r.top-th-8;
    tip.style.left=left+'px'; tip.style.top=Math.max(m,top)+'px';
  }
  function hide(){ tip.classList.remove('show'); if(cur){ cur.removeAttribute('aria-describedby'); cur=null; } }
  document.addEventListener('mouseover', e=>{ const el=e.target.closest('[data-tip]'); if(el && el!==cur) show(el); });
  document.addEventListener('mouseout', e=>{ const el=e.target.closest('[data-tip]'); if(el && !el.contains(e.relatedTarget)) hide(); });
  document.addEventListener('focusin', e=>{ const el=e.target.closest('[data-tip]'); if(el) show(el); else hide(); });
  document.addEventListener('focusout', e=>{ if(e.target.closest('[data-tip]')) hide(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') hide(); });
  window.addEventListener('scroll', hide, true);
  window.addEventListener('resize', hide);
})();
const DBG_HINTS={off:'',wire:'Low-fidelity boxes — structure only, no color or imagery.',outline:'Every element outlined; nested depth shown by color.',labels:'Each region tagged with its HTML tag + class.',grid:'12-column reference grid (24px gutters).',brand:'Each region tagged with the wsu-eit-* brand class it ships with in the XSLT.'};
function updateDbgHint(){
  const h=document.getElementById('dbgHint'); if(!h) return;
  if(debug==='grid'){ h.textContent='12-column Bootstrap grid · 24px gutters · column count is constant — what changes per breakpoint is each element’s col-* span.'; }
  else h.textContent=DBG_HINTS[debug]||'';
}
document.getElementById('debugSeg').addEventListener('click', e=>{ const btn=e.target.closest('button'); if(!btn) return; debug=btn.getAttribute('data-dbg'); [...e.currentTarget.children].forEach(c=>{ const on=c===btn; c.classList.toggle('on',on); c.setAttribute('aria-pressed',on); }); renderPreview(); });
function applyDevice(){
  const d=DEVICES.find(x=>x.id===device)||DEVICES[3];
  const frame=document.getElementById('frame'), wrap=document.getElementById('frameWrap'), dev=document.getElementById('device'), cap=document.getElementById('devCaption');
  if(!frame||!wrap||!dev) return;
  wrap.setAttribute('data-device', d.dev);
  frame.style.width=d.w+'px';
  const avail=wrap.clientWidth;
  const dw=dev.offsetWidth;
  const scale=(avail>0&&dw>0) ? Math.min(1, avail/dw) : 1;
  dev.style.transform = scale<1 ? 'scale('+scale+')' : 'none';
  // reserve the scaled height so the caption / status flow correctly
  const h=dev.offsetHeight;
  wrap.style.height = scale<1 ? Math.ceil(h*scale)+'px' : 'auto';
  if(cap){
    const pct=Math.round(scale*100);
    cap.innerHTML='<b>'+d.label+'</b> · <code>'+d.w+'px</code> <span class="bs">'+d.bs+'</span>'+(scale<1?' <span class="scaled">· shown at '+pct+'%</span>':'');
  }
}
document.getElementById('viewBtn').addEventListener('click', openDrawer);
const helpBtn=document.getElementById('helpBtn');
helpBtn.addEventListener('click', ()=>{ const on=document.body.classList.toggle('help-on'); helpBtn.setAttribute('aria-pressed', on?'true':'false'); });
document.getElementById('preflightBtn').addEventListener('click', ()=>{ const g=document.getElementById('grp-preflight'); if(g){ g.open=true; document.querySelector('aside').scrollTop=0; } });
document.getElementById('areaHeading').addEventListener('input', e=>{ CC().heading=e.target.value; softUpdate(); });
document.getElementById('areaIntro').addEventListener('input', e=>{ CC().intro=e.target.value; softUpdate(); });
document.getElementById('areaSel').addEventListener('change', e=>{ setArea(e.target.value); });
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'&&drawerOpen){ closeDrawer(); return; }
  if(e.key==='Tab'&&drawerOpen){
    const d=document.querySelector('.drawer'); if(!d) return;
    const f=[...d.querySelectorAll('button,select,[href],input,textarea,[tabindex]:not([tabindex="-1"])')].filter(el=>!el.disabled&&el.offsetParent!==null);
    if(!f.length) return;
    const first=f[0], last=f[f.length-1];
    if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
  }
});

/* example picker */
const psel=document.getElementById('presetSel');
EXAMPLES.forEach(x=>{ const o=document.createElement('option'); o.value=x.id; o.textContent=x.name; psel.appendChild(o); });
psel.addEventListener('change', e=>{ const ex=EXAMPLES.find(x=>x.id===e.target.value); if(ex) setArea(ex.area); e.target.value=''; });

function fillAreaSel(){ const s=document.getElementById('areaSel'); s.innerHTML=AREAS.map(a=>`<option value="${a.id}">${a.label}</option>`).join(''); s.value=state.previewArea; }

/* boot */
fillAreaSel();
syncAreaInputs();
renderSidebar();
renderPreview();
</script>
